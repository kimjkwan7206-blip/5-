            const qaItem = document.createElement('div');
            qaItem.className = 'bg-white dark:bg-gray-800 rounded-lg shadow-md overflow-hidden';
            qaItem.setAttribute('data-accordion-item', '');

            qaItem.innerHTML = `
                <button data-accordion-header class="w-full text-left p-4 flex justify-between items-center cursor-pointer hover:bg-green-50 dark:hover:bg-gray-700 transition-colors focus:outline-none">
                    <span class="font-semibold text-lg text-gray-800 dark:text-white">${item.number}. ${item.title}</span>
                    <span data-accordion-icon class="text-2xl font-light text-green-600 dark:text-green-400 transform transition-transform">➕</span>
                </button>
                <div data-accordion-content class="px-6 pb-6">
                    <div class="space-y-4">
                        <div class="bg-blue-50 dark:bg-blue-900/50 p-4 rounded-md mt-4">
                            <h4 class="font-bold mb-2 text-blue-800 dark:text-blue-300">🇬🇧 English Scenario & Decision</h4>
                            <p class="font-mono text-sm text-blue-700 dark:text-blue-200"><strong>Scenario:</strong> ${item.scenario_en}</p>
                            <p class="font-mono text-sm mt-2 text-blue-700 dark:text-blue-200">${item.decision_en.replace('What is the correct decision? ', '<strong>Decision:</strong> ')}</p>
                        </div>
                        <div>
                            <h4 class="font-bold mb-2 text-gray-700 dark:text-gray-300">🇰🇷 한국어 상황 및 판정</h4>
                            <p class="mb-2"><strong>상황:</strong> ${item.scenario_ko}</p>
                            <p>${item.decision_ko.replace('올바른 판정은 무엇입니까? ', '<strong>판정:</strong> ').replace('이 경우 올바른 절차는 무엇인가?', '<strong>절차:</strong> ').replace('주장에 대해 어떤 조치를 취할 수 있습니까?', '<strong>조치:</strong> ').replace('해당 선수에게 어떤 조치를 취할 수 있습니까?', '<strong>조치:</strong> ').replace('올바른 절차는 무엇입니까?', '<strong>절차:</strong> ').replace('올바른 경기 재개 방법과 징계 조치는 무엇입니까?', '<strong>재개 및 징계:</strong> ').replace('판정은 무엇입니까?', '<strong>판정:</strong> ').replace('주심의 판정은 무엇입니까?', '<strong>판정:</strong> ').replace('플레이는 어떻게 재개됩니까?', '<strong>재개:</strong> ').replace('이 상황에서의 올바른 절차는 무엇입니까?', '<strong>절차:</strong> ')}</p>
                        </div>
                        <div class="bg-yellow-100 dark:bg-yellow-800/60 p-4 rounded-lg border-l-4 border-yellow-400">
                            <p class="font-semibold text-yellow-800 dark:text-yellow-200">💡 <strong>핵심 포인트:</strong> ${item.key_point}</p>
                        </div>
                    </div>
                </div>
            `;
            container.appendChild(qaItem);
        });

        // Accordion Logic
        const accordionItems = document.querySelectorAll('[data-accordion-item]');
        accordionItems.forEach(item => {
            const header = item.querySelector('[data-accordion-header]');
            const content = item.querySelector('[data-accordion-content]');
            const icon = item.querySelector('[data-accordion-icon]');

            header.addEventListener('click', () => {
                const isHidden = content.style.maxHeight === '0px' || !content.style.maxHeight;
                
                if (isHidden) {
                    content.style.maxHeight = content.scrollHeight + 'px';
                    icon.classList.add('rotate-45');
                    icon.textContent = '✖️';
                } else {
                    content.style.maxHeight = '0px';
                    icon.classList.remove('rotate-45');
                    icon.textContent = '➕';
                }
            });
        });

        // Search Logic
        const searchInput = document.getElementById('searchInput');
        searchInput.addEventListener('keyup', (e) => {
            const filter = e.target.value.toLowerCase().trim();
            accordionItems.forEach(item => {
                const itemText = item.textContent.toLowerCase();
                if (itemText.includes(filter)) {
                    item.style.display = '';
                } else {
                    item.style.display = 'none';
                }
            });
        });
        
        // Expand/Collapse All Logic
        const expandAllBtn = document.getElementById('expandAll');
        const collapseAllBtn = document.getElementById('collapseAll');

        expandAllBtn.addEventListener('click', () => {
            accordionItems.forEach(item => {
                if (item.style.display !== 'none') { // Only affect visible items
                    const content = item.querySelector('[data-accordion-content]');
                    const icon = item.querySelector('[data-accordion-icon]');
                    content.style.maxHeight = content.scrollHeight + 'px';
                    icon.classList.add('rotate-45');
                    icon.textContent = '✖️';
                }
            });
        });

        collapseAllBtn.addEventListener('click', () => {
            accordionItems.forEach(item => {
                const content = item.querySelector('[data-accordion-content]');
                const icon = item.querySelector('[data-accordion-icon]');
                content.style.maxHeight = '0px';
                icon.classList.remove('rotate-45');
                icon.textContent = '➕';
            });
        });

    });
</script>

</body>
</html>
